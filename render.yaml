services:
  # Backend Web Service
  - type: web
    name: community-copilot-api
    runtime: node
    buildCommand: cd server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
      - key: PORT
        value: 3001
      - key: GEMINI_API_KEY
        sync: false # You will need to add this manually in the Render dashboard
      - key: CORS_ORIGIN
        value: "*" # We can tighten this later to the frontend URL

  # Frontend Static Site
  - type: web
    name: community-copilot-client
    runtime: static
    buildCommand: cd client && npm install && npm run build
    staticPublishPath: client/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: community-copilot-api
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
